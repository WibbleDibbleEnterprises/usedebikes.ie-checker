name: usedebikes Checker

on:
  schedule:
    # Runs every 30 minutes
    - cron: "0,30 * * * *"
  workflow_dispatch:
    # Also allows you to run it manually from GitHub with a button click

jobs:
  check-listings:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Needed so the bot can save seen_ids.json back to the repo

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run the listing checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python checker.py

      - name: Save updated seen IDs back to the repo
        run: |
          git config user.name "listing-bot"
          git config user.email "listing-bot@users.noreply.github.com"
          git add seen_ids.json
          git diff --staged --quiet || git commit -m "Update seen listing IDs [skip ci]"
          git push
